{{- if and .Values.evidenceStore.enabled .Values.evidenceStore.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "arhiax.evidenceStore.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "arhiax.evidenceStore.labels" . | nindent 4 }}
  {{- with .Values.evidenceStore.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
