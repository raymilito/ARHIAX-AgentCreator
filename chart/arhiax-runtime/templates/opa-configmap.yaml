{{- if .Values.opa.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "arhiax.opa.configMapName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "arhiax.opa.labels" . | nindent 4 }}
data:
  config.yaml: |
    # =========================================================================
    # OPA configuration for ARHIAX runtime
    # Generated by arhiax-runtime Helm chart - do not edit directly.
    # =========================================================================
    services:
      {{- if and (eq .Values.opa.bundleSource.mode "server") .Values.opa.bundleServer.enabled }}
      arhiax_bundle_server:
        url: {{ .Values.opa.bundleServer.url | quote }}
        {{- if .Values.opa.bundleServer.credentials.existingSecret }}
        credentials:
          bearer:
            token_path: /var/run/secrets/arhiax/bundle-token
        {{- end }}
      {{- end }}

    {{- if eq .Values.opa.bundleSource.mode "configmap" }}
    # Bundles are mounted from a ConfigMap at /policies. OPA watches this
    # directory directly via --set=bundles.* is NOT used; instead we pass
    # the directory as a positional arg in the Deployment command.
    {{- else if and (eq .Values.opa.bundleSource.mode "server") .Values.opa.bundleServer.enabled }}
    bundles:
      arhiax:
        service: arhiax_bundle_server
        resource: /bundles/arhiax.tar.gz
        polling:
          min_delay_seconds: {{ .Values.opa.bundleServer.polling.minDelaySeconds }}
          max_delay_seconds: {{ .Values.opa.bundleServer.polling.maxDelaySeconds }}
    {{- end }}

    {{- if .Values.opa.decisionLogs.enabled }}
    decision_logs:
      console: {{ .Values.opa.decisionLogs.console }}
    {{- end }}

    status:
      console: true

    default_decision: /arhiax/main/allow

    # Distributed tracing disabled in CE; enable in enterprise builds.
    distributed_tracing: {}
{{- end }}
