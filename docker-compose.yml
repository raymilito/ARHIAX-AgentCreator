# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  ARHIAX AgentCreator — Stack completo de gobernanza                    ║
# ║                                                                        ║
# ║  Servicios:                                                            ║
# ║    creator-api    :8300  ← Fábrica de agentes gobernados (entrar aquí) ║
# ║    gateway        :8080  ← Policy Enforcement Point                   ║
# ║    aim-service    :8200  ← Identidad y credenciales                   ║
# ║    aut-service    :8201  ← Autonomía A0-A4                            ║
# ║    bbr-service    :8202  ← Línea base conductual                      ║
# ║    hic-service    :8203  ← Human-in-the-loop checkpoints              ║
# ║    evidence-store :8090  ← Ledger inmutable de decisiones             ║
# ║    opa            :8181  ← Motor de políticas OPA/Rego                ║
# ║                                                                        ║
# ║  TLS: comunicación inter-servicio cifrada con CA interna.              ║
# ║  Requisito previo: ejecutar `make certs` para generar los             ║
# ║  certificados en ./certs/ antes del primer `docker compose up`.        ║
# ╚══════════════════════════════════════════════════════════════════════════╝

networks:
  arhiax-net:
    driver: bridge

volumes:
  aim-data:
  aut-data:
  bbr-data:
  hic-data:
  evidence-data:
  opa-bundles:
  redis-data:
  broker-keys:

# Volumen compartido de certificados (read-only en todos los servicios)
x-certs-volume: &certs-volume
  type: bind
  source: ./certs
  target: /certs
  read_only: true

x-python-base: &python-base
  restart: unless-stopped
  networks:
    - arhiax-net

services:

  # ── OPA — Motor de políticas ────────────────────────────────────────────
  # OPA no soporta TLS nativo sin proxy. Queda en HTTP interno (no expuesto
  # al host) dentro de la red privada arhiax-net.
  opa:
    image: openpolicyagent/opa:0.68.0
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /bundles/main.rego
    volumes:
      - ./runtime/bundles:/bundles:ro
    networks:
      - arhiax-net
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis — Store de jti (replay + revocacion) ─────────────────────────
  # Backend persistente para deteccion de replay y revocacion de tokens
  # efimeros del gateway. Usa AOF para no perder estado en reinicios.
  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - "volatile-lru"
    volumes:
      - redis-data:/data
    networks:
      - arhiax-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Evidence Store — Ledger inmutable ───────────────────────────────────
  evidence-store:
    build:
      context: ./services/evidence-store
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      ARHIAX_PRODUCTION: ${ARHIAX_PRODUCTION:-false}
      LEDGER_PATH: /data/evidence.jsonl
      EVIDENCE_HMAC_SECRET: ${EVIDENCE_HMAC_SECRET:-arhiax-evidence-secret-CHANGE-ME}
      # Vault opcional — si VAULT_ADDR + VAULT_TOKEN estan definidos en el
      # entorno, el servicio lee el secreto en arhiax/evidence#hmac antes de
      # caer al env var.
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
    volumes:
      - evidence-data:/data
      - *certs-volume
    <<: *python-base
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          if [ -f /certs/evidence-store.crt ]; then
            curl -sf --cacert /certs/ca.crt --cert /certs/evidence-store.crt --key /certs/evidence-store.key https://localhost:8090/healthz;
          else
            curl -sf http://localhost:8090/healthz;
          fi
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Gateway — Policy Enforcement Point ──────────────────────────────────
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      OPA_URL: http://opa:8181
      EVIDENCE_STORE_URL: https://evidence-store:8090
      MAX_REQUEST_BODY_BYTES: "1048576"
      ARHIAX_CA_CERT: /certs/ca.crt
      ARHIAX_TLS_CLIENT_CERT: /certs/gateway.crt
      ARHIAX_TLS_CLIENT_KEY: /certs/gateway.key
      ARHIAX_REQUIRE_MTLS: "true"
      ARHIAX_REDIS_URL: redis://redis:6379/0
      ARHIAX_REDIS_PREFIX: arhiax:gw
      GATEWAY_PUBLIC_URL: https://gateway:8080
      BROKER_JWKS_URL: https://credential-broker:8204/.well-known/jwks.json
      BROKER_JWKS_REFRESH_SECONDS: "300"
    volumes:
      - *certs-volume
    depends_on:
      opa:
        condition: service_healthy
      evidence-store:
        condition: service_healthy
      redis:
        condition: service_healthy
      credential-broker:
        condition: service_healthy
    <<: *python-base
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          if [ -f /certs/gateway.crt ]; then
            curl -sf --cacert /certs/ca.crt --cert /certs/gateway.crt --key /certs/gateway.key https://localhost:8080/healthz;
          else
            curl -sf http://localhost:8080/healthz;
          fi
      interval: 10s
      timeout: 3s
      retries: 5

  # ── AIM Service — Identidad y credenciales ──────────────────────────────
  aim-service:
    build:
      context: ./services/aim-service
      dockerfile: Dockerfile
    ports:
      - "8200:8200"
    environment:
      ARHIAX_PRODUCTION: ${ARHIAX_PRODUCTION:-false}
      AIM_HMAC_SECRET: ${AIM_HMAC_SECRET:-arhiax-aim-secret-CHANGE-ME}
      AIM_DB_PATH: /data/aim.db
      # Vault opcional — leera arhiax/aim#hmac si VAULT_ADDR+TOKEN existen.
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
    volumes:
      - aim-data:/data
      - *certs-volume
    <<: *python-base
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          if [ -f /certs/aim-service.crt ]; then
            curl -sf --cacert /certs/ca.crt --cert /certs/aim-service.crt --key /certs/aim-service.key https://localhost:8200/healthz;
          else
            curl -sf http://localhost:8200/healthz;
          fi
      interval: 10s
      timeout: 3s
      retries: 3

  # ── AUT Service — Autonomía A0-A4 ───────────────────────────────────────
  aut-service:
    build:
      context: ./services/aut-service
      dockerfile: Dockerfile
    ports:
      - "8201:8201"
    environment:
      AUT_DB_PATH: /data/aut.db
    volumes:
      - aut-data:/data
      - *certs-volume
    <<: *python-base
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          if [ -f /certs/aut-service.crt ]; then
            curl -sf --cacert /certs/ca.crt --cert /certs/aut-service.crt --key /certs/aut-service.key https://localhost:8201/healthz;
          else
            curl -sf http://localhost:8201/healthz;
          fi
      interval: 10s
      timeout: 3s
      retries: 3

  # ── BBR Service — Línea base conductual ────────────────────────────────
  bbr-service:
    build:
      context: ./services/bbr-service
      dockerfile: Dockerfile
    ports:
      - "8202:8202"
    environment:
      BBR_DB_PATH: /data/bbr.db
    volumes:
      - bbr-data:/data
      - *certs-volume
    <<: *python-base
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          if [ -f /certs/bbr-service.crt ]; then
            curl -sf --cacert /certs/ca.crt --cert /certs/bbr-service.crt --key /certs/bbr-service.key https://localhost:8202/healthz;
          else
            curl -sf http://localhost:8202/healthz;
          fi
      interval: 10s
      timeout: 3s
      retries: 3

  # ── HIC Service — Human-in-the-loop ────────────────────────────────────
  hic-service:
    build:
      context: ./services/hic-service
      dockerfile: Dockerfile
    ports:
      - "8203:8203"
    environment:
      HIC_DB_PATH: /data/hic.db
      HIC_WEBHOOK_URL: ${HIC_WEBHOOK_URL:-}
    volumes:
      - hic-data:/data
      - *certs-volume
    <<: *python-base
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          if [ -f /certs/hic-service.crt ]; then
            curl -sf --cacert /certs/ca.crt --cert /certs/hic-service.crt --key /certs/hic-service.key https://localhost:8203/healthz;
          else
            curl -sf http://localhost:8203/healthz;
          fi
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Creator API — Fábrica de agentes gobernados ─────────────────────────
  credential-broker:
    build:
      context: ./services/credential-broker
      dockerfile: Dockerfile
    ports:
      - "8204:8204"
    environment:
      BROKER_DEFAULT_TTL_SECONDS: "60"
      BROKER_MAX_TTL_SECONDS: "300"
      BROKER_REQUIRE_SIGNED_AGENT_PROOF: ${BROKER_REQUIRE_SIGNED_AGENT_PROOF:-true}
      BROKER_AGENT_PROOF_MAX_SKEW_SECONDS: ${BROKER_AGENT_PROOF_MAX_SKEW_SECONDS:-60}
      BROKER_SIGNING_KEY_PATH: /data/broker_signing_key.pem
      BROKER_PERSIST_KEY: "true"
      AIM_URL: https://aim-service:8200
      ARHIAX_CA_CERT: /certs/ca.crt
      ARHIAX_TLS_CLIENT_CERT: /certs/credential-broker.crt
      ARHIAX_TLS_CLIENT_KEY: /certs/credential-broker.key
      ARHIAX_REQUIRE_MTLS: "true"
    volumes:
      - broker-keys:/data
      - *certs-volume
    depends_on:
      aim-service:
        condition: service_healthy
    <<: *python-base
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          if [ -f /certs/credential-broker.crt ]; then
            curl -sf --cacert /certs/ca.crt --cert /certs/credential-broker.crt --key /certs/credential-broker.key https://localhost:8204/healthz;
          else
            curl -sf http://localhost:8204/healthz;
          fi
      interval: 10s
      timeout: 3s
      retries: 3

  creator-api:
    build:
      context: ./services/creator-api
      dockerfile: Dockerfile
    ports:
      - "8300:8300"
    environment:
      AIM_URL: https://aim-service:8200
      AUT_URL: https://aut-service:8201
      GATEWAY_URL: https://gateway:8080
      HIC_URL: https://hic-service:8203
      CREDENTIAL_BROKER_URL: https://credential-broker:8204
      ARHIAX_CA_CERT: /certs/ca.crt
      ARHIAX_TLS_CLIENT_CERT: /certs/creator-api.crt
      ARHIAX_TLS_CLIENT_KEY: /certs/creator-api.key
      ARHIAX_REQUIRE_MTLS: "true"
    volumes:
      - *certs-volume
    depends_on:
      gateway:
        condition: service_healthy
      aim-service:
        condition: service_healthy
      aut-service:
        condition: service_healthy
      credential-broker:
        condition: service_healthy
    <<: *python-base
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - >
          if [ -f /certs/creator-api.crt ]; then
            curl -sf --cacert /certs/ca.crt --cert /certs/creator-api.crt --key /certs/creator-api.key https://localhost:8300/healthz;
          else
            curl -sf http://localhost:8300/healthz;
          fi
      interval: 15s
      timeout: 5s
      retries: 3
