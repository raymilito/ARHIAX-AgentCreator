name: CI — ARHIAX AgentCreator

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Tests de servicios ──────────────────────────────────────────────────────
  test-services:
    name: Tests — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - aim-service
          - aut-service
          - bbr-service
          - creator-api
          - evidence-store
          - gateway
          - hic-service

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Instalar dependencias del servicio
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Ejecutar tests
        env:
          AIM_HMAC_SECRET: test-secret-ci
          EVIDENCE_HMAC_SECRET: test-evidence-secret-ci
          HIC_WEBHOOK_URL: ""
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short --junit-xml=test-results.xml

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/test-results.xml

  # ── Tests del SDK ───────────────────────────────────────────────────────────
  test-sdk:
    name: Tests — SDK Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar SDK y dependencias de test
        run: |
          pip install -e sdk/python/
          pip install pytest pytest-asyncio httpx

      - name: Ejecutar tests del SDK
        run: |
          cd sdk/python
          python -m pytest tests/ -v --tb=short --junit-xml=test-results-sdk.xml

      - name: Publicar resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-sdk
          path: sdk/python/test-results-sdk.xml

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint — flake8
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar flake8
        run: pip install flake8

      - name: Lint servicios
        run: |
          for svc in aim-service aut-service bbr-service creator-api evidence-store gateway hic-service; do
            echo "→ services/$svc"
            flake8 services/$svc/main.py --max-line-length=100 --ignore=E501,W503
          done

      - name: Lint SDK
        run: |
          flake8 sdk/python/arhiax/ --max-line-length=100 --ignore=E501,W503

  # ── Build de imágenes Docker ────────────────────────────────────────────────
  build-images:
    name: Build Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [test-services]
    strategy:
      fail-fast: false
      matrix:
        service:
          - aim-service
          - aut-service
          - bbr-service
          - creator-api
          - evidence-store
          - gateway
          - hic-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: arhiax/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Validar Helm Chart ──────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Lint arhiax-runtime chart
        run: helm lint chart/arhiax-runtime/

      - name: Lint arhiax-atk-standalone chart
        run: helm lint chart/arhiax-atk-standalone/

      - name: Template render (dry-run)
        run: |
          helm template arhiax chart/arhiax-runtime/ \
            --set gateway.image.tag=ci \
            --set opa.image.tag=0.68.0-rootless \
            --debug > /dev/null

  # ── Validar políticas OPA ───────────────────────────────────────────────────
  opa-check:
    name: OPA — Validar bundles Rego
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar OPA CLI
        run: |
          curl -L -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/v0.68.0/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa

      - name: Verificar sintaxis de todos los bundles
        run: |
          find runtime/bundles -name "*.rego" | while read f; do
            echo "→ $f"
            opa check "$f"
          done

      - name: Verificar política base
        run: opa check runtime/opa/main.rego

  # ── Security scan ───────────────────────────────────────────────────────────
  security-scan:
    name: Security — Bandit SAST
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Bandit
        run: pip install bandit

      - name: Escanear servicios
        run: |
          bandit -r services/ -ll -x services/*/tests/ \
            --skip B101,B106 \
            -f json -o bandit-report.json || true

      - name: Escanear SDK
        run: |
          bandit -r sdk/python/arhiax/ -ll \
            --skip B101 \
            -f json -o bandit-sdk-report.json || true

      - name: Publicar reporte Bandit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-reports
          path: bandit-*.json

  # ── Gate final ──────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Completo
    runs-on: ubuntu-latest
    needs: [test-services, test-sdk, lint, helm-lint, opa-check]
    if: always()

    steps:
      - name: Verificar resultado de todos los jobs
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "Resultados: $results"
          if echo "$results" | grep -qE "failure|cancelled"; then
            echo "CI FALLIDO — revisar jobs anteriores"
            exit 1
          fi
          echo "CI EXITOSO"
