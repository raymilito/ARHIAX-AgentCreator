frameworks:
  ARISE:
    fullName: ARISE Framework (Assessed Intelligence)
    version: 1.0 (March 2026)
    elements:
      GOVERN:
        name: Govern
        description: Organizational governance structures, policies, roles, and accountability for AI systems
      MANAGE:
        name: Manage
        description: Ongoing management of AI systems including lifecycle, change control, and resource allocation
      IDENTIFY:
        name: Identify
        description: Asset identification, risk assessment, and environmental context for AI systems
      PROTECT:
        name: Protect
        description: Technical and organizational safeguards to ensure AI system integrity and security
      DETECT:
        name: Detect
        description: Monitoring, anomaly detection, and continuous assessment of AI system behavior
      RESPOND:
        name: Respond
        description: Incident response, escalation, and remediation procedures for AI system events
      VALIDATE:
        name: Validate
        description: Pre-production validation, testing, and executive approval gates
  OWASP:
    fullName: OWASP Top 10 for Agentic Applications 2026
    version: 1.0 (December 2025)
    elements:
      ASI-01:
        name: Prompt Injection
        description: Direct and indirect prompt injection attacks manipulating agent behavior
      ASI-02:
        name: Broken Access Control
        description: Inadequate enforcement of agent permissions and authorization boundaries
      ASI-03:
        name: Broken Trust Boundaries
        description: Failure to enforce trust boundaries between agents and between agents and external systems
      ASI-04:
        name: Insufficient Monitoring
        description: Lack of adequate logging, monitoring, and anomaly detection for agent actions
      ASI-05:
        name: Insecure Autonomy
        description: Agents operating with excessive autonomy without appropriate human oversight
      ASI-06:
        name: RAG Poisoning
        description: Manipulation of retrieval-augmented generation data sources to influence agent outputs
      ASI-07:
        name: Unsafe Output Handling
        description: Inadequate validation and sanitization of agent-generated outputs
      ASI-08:
        name: Insufficient Audit Trail
        description: Failure to maintain tamper-proof records of agent decisions and actions
      ASI-09:
        name: Overreliance on Agents
        description: Excessive trust in agent outputs without appropriate human verification
      ASI-10:
        name: Supply Chain Vulnerabilities
        description: Risks from third-party models, tools, and dependencies in the agent supply chain
  CSA_ATF:
    fullName: CSA Agentic Trust Framework
    version: 1.0 (February 2026)
    elements:
      E1:
        name: Identity & Authentication
        description: Agent identity management, credential issuance, and authentication mechanisms
      E2:
        name: Behavioral Monitoring
        description: Continuous observation and analysis of agent behavioral patterns
      E3:
        name: Segmentation & Boundaries
        description: Isolation, scope limitation, and trust boundary enforcement for agents
      E4:
        name: I/O Governance
        description: Input validation, output sanitization, and data flow control
      E5:
        name: Incident Response
        description: Detection, containment, and recovery procedures for agent-related incidents
  MGF:
    fullName: Singapore Model Governance Framework for Agentic AI
    version: 1.0 (January 2026, IMDA)
    elements:
      Dim1:
        name: Accountability & Governance
        description: Organizational accountability structures and governance mechanisms for agentic AI
      Dim2:
        name: Security & Trust
        description: Security controls, trust mechanisms, and identity management for AI agents
      Dim3:
        name: Safety & Monitoring
        description: Operational safety, continuous monitoring, and anomaly detection
      Dim4:
        name: Human Oversight
        description: Human-in-the-loop controls, escalation mechanisms, and override capabilities
  NIST_CSF:
    fullName: NIST Cybersecurity Framework 2.0 + AI RMF
    version: CSF 2.0 (2024) + AI RMF 1.0 + CAISI (2026)
    elements:
      GV:
        name: Govern
        description: Cybersecurity risk management strategy, expectations, and policy
      ID:
        name: Identify
        description: Understanding organizational context, assets, and risk
      PR:
        name: Protect
        description: Safeguards to manage cybersecurity risks
      DE:
        name: Detect
        description: Finding and analyzing cybersecurity events
      RS:
        name: Respond
        description: Actions regarding detected cybersecurity incidents
      RC:
        name: Recover
        description: Restoring capabilities after cybersecurity incidents
