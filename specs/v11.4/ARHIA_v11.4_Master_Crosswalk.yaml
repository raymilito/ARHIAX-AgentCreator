partialCoverageNotes:
  OWASP-ASI-06: 'RAG Poisoning: ARHIA covers data access monitoring and input validation but user behavioral trust patterns
    (social engineering via RAG) require organizational controls beyond runtime enforcement.'
  OWASP-ASI-09: 'Overreliance: ARHIA provides HITL checkpoints and escalation routing but human trust calibration patterns
    are behavioral/organizational, partially beyond runtime scope.'
  NIST_CSF-RC: 'Recover: ARHIA provides agent-level recovery through playbook dispatch and demotion triggers but organizational
    business continuity planning (BCP/DR) is outside runtime scope.'
